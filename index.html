<script>
// Supabase zonder externe bibliotheek — directe fetch aanroepen
const SUPABASE_URL = 'https://msoveybpxvflgziiyegf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zb3ZleWJweHZmbGd6aWl5ZWdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NTMwNDAsImV4cCI6MjA5NDMyOTA0MH0.qALKwA913RCO7gi3eJQqUAhNTlJELMs3-a6iA61VcR8';

const HEADERS = () => ({
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=minimal'
});

const sb = {
  from: (table) => ({
    insert: (rows) => fetch(`${SUPABASE_URL}/rest/v1/${table}`, {method:'POST', headers:HEADERS(), body:JSON.stringify(Array.isArray(rows)?rows:[rows])}).then(async r=>{if(!r.ok){const t=await r.text();throw new Error(t);}return {data:null,error:null};}).catch(e=>({data:null,error:e})),
    update: (vals) => ({
      eq: (col, val) => fetch(`${SUPABASE_URL}/rest/v1/${table}?${col}=eq.${encodeURIComponent(val)}`, {method:'PATCH', headers:HEADERS(), body:JSON.stringify(vals)}).then(async r=>{if(!r.ok){const t=await r.text();throw new Error(t);}return {data:null,error:null};}).catch(e=>({data:null,error:e}))
    }),
    delete: () => ({
      eq: (col, val) => fetch(`${SUPABASE_URL}/rest/v1/${table}?${col}=eq.${encodeURIComponent(val)}`, {method:'DELETE', headers:HEADERS()}).then(async r=>{if(!r.ok){const t=await r.text();throw new Error(t);}return {data:null,error:null};}).catch(e=>({data:null,error:e}))
    })
  })
};

async function laadAlles(){
  syncBar('⟳ Data laden...');
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json'
  };
  try{
    const [b,s,w] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/bestellingen?select=*&order=created_at.desc`, {headers}).then(r=>r.json()),
      fetch(`${SUPABASE_URL}/rest/v1/staarten?select=*&order=created_at.asc`, {headers}).then(r=>r.json()),
      fetch(`${SUPABASE_URL}/rest/v1/weavings?select=*&order=created_at.asc`, {headers}).then(r=>r.json())
    ]);
    if(Array.isArray(b)) cache.bestellingen=b;
    if(Array.isArray(s)) cache.staarten=s;
    if(Array.isArray(w)) cache.weavings=w;
  }catch(e){toast('❌ Verbindingsfout: '+e.message);}
  syncBar(null);
}
</script>

<script>
let cache = {bestellingen:[], staarten:[], weavings:[]};

function toast(msg, duur=2500){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),duur);
}
function syncBar(msg){
  const el=document.getElementById('sync-bar');
  if(msg){el.textContent=msg;el.style.display='block';}
  else el.style.display='none';
}


function showTab(t,el){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(el)el.classList.add('active');
  if(t==='zendingen')renderLijst();
  if(t==='bestellingen')renderSalonBestellingen();
  if(t==='voorraad')renderVoorraad();
  if(t==='lookup'){
    document.getElementById('lookup-input').value='';
    document.getElementById('lookup-klant').value='';
    document.getElementById('lookup-salon').value='';
    document.getElementById('lookup-result').innerHTML='';
  }
}

function fotoNaarBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(file);});}

// ── LIJST ──
function renderLijst(){
  const el=document.getElementById('view-lijst');
  document.getElementById('view-bestelling').style.display='none';
  el.style.display='block';
  let html=`<div class="page-header"><p class="sec-title" style="margin:0">Zendingen</p><button class="btn btn-primary" onclick="nieuweZendingForm()">+ Nieuwe zending</button></div>`;
  if(!cache.bestellingen.length){
    html+=`<div class="empty-state"><div style="font-size:48px;margin-bottom:12px">📦</div><p style="font-weight:500;margin-bottom:6px">Nog geen bestellingen</p><p style="font-size:13px">Maak je eerste bestelling aan om te beginnen.</p></div>`;
  } else {
    const sl={'open':'Aangemaakt','fabriek':'Bij fabriek','terug':'Terug ontvangen'};
    cache.bestellingen.forEach(b=>{
      const st=cache.staarten.filter(s=>s.bestel_id===b.id);
      const wv=cache.weavings.filter(w=>w.bestel_id===b.id);
      const beschikbaar=wv.filter(w=>!w.status||w.status==='beschikbaar').length;
      const staartMetWeavings=st.filter(s=>wv.some(w=>w.staart_id===s.id)).length;
      const volledigAfgerond=b.status==='terug'&&st.length>0&&staartMetWeavings===st.length;
      const ontbreken=st.length>0&&staartMetWeavings<st.length;
      html+=`<div class="card card-hover" onclick="openBestelling('${b.id}')">
        <div class="row" style="justify-content:space-between;margin-bottom:10px">
          <div class="row" style="gap:8px">
            <span class="badge badge-purple">${b.nummer}</span>
            <span class="order-status status-${b.status}">${sl[b.status]||b.status}</span>
            ${volledigAfgerond?`<span style="background:#E1F5EE;color:#085041;display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:500">✅ Volledig afgerond</span>`:''}
            ${ontbreken&&!volledigAfgerond?`<span style="background:#FAEEDA;color:#633806;display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:500">⏳ ${st.length-staartMetWeavings} staart${st.length-staartMetWeavings!==1?'en':''} wacht op weavings</span>`:''}
          </div>
          <span style="font-size:12px;color:#888">${b.datum||''}</span>
        </div>
        <div class="row" style="gap:16px">
          <span style="font-size:13px;color:#666">✂️ ${st.length} staart${st.length!==1?'en':''}</span>
          <span style="font-size:13px;color:#666">🧶 ${wv.length} weaving${wv.length!==1?'s':''}</span>
          ${beschikbaar>0?`<span style="font-size:13px;color:#085041">✓ ${beschikbaar} beschikbaar</span>`:''}
          ${b.fabriek?`<span style="font-size:13px;color:#666">🏭 ${b.fabriek}</span>`:''}
        </div>
      </div>`;
    });
  }
  el.innerHTML=html;
}

async function laadFoto(i,input){
  if(!input.files[0])return;
  const b64=await fotoNaarBase64(input.files[0]);
  fotoMap[i]=b64;
  const box=document.getElementById('foto-box-'+i);
  box.innerHTML=`<input type="file" accept="image/*" onchange="laadFoto(${i},this)"><img src="${b64}" style="width:100%;height:56px;object-fit:cover;border-radius:8px"><span style="font-size:10px;color:#888">Klik om te wijzigen</span>`;
}

function voegSlaartRijToe(){document.getElementById('staart-rijen')?.insertAdjacentHTML('beforeend',staartRijHTML(rijTeller));rijTeller++;}
function verwijderLaatsteRij(){if(rijTeller<=1)return;rijTeller--;document.getElementById('staart-rij-'+rijTeller)?.remove();delete fotoMap[rijTeller];}

async function slaBestellingOp(){
  const nr=document.getElementById('nb-nr')?.value.trim();
  if(!nr){document.getElementById('nb-msg').innerHTML='<span class="warn">Vul een bestelnummer in</span>';return;}
  if(cache.bestellingen.find(b=>b.nummer===nr)){document.getElementById('nb-msg').innerHTML='<span class="warn">Dit nummer bestaat al</span>';return;}
  const btn=document.getElementById('opslaan-btn');btn.disabled=true;btn.textContent='Opslaan...';
  const id='b_'+Date.now();
  let nieuweStaarten=[];let fout=false;
  for(let i=0;i<rijTeller;i++){
    const el=document.getElementById('staart-rij-'+i);if(!el)continue;
    const snr=document.getElementById('sr-nr-'+i)?.value.trim();
    const gew=document.getElementById('sr-gew-'+i)?.value;
    if(!snr||!gew){fout=true;break;}
    nieuweStaarten.push({id:'s_'+Date.now()+'_'+i,bestel_id:id,nr:snr,kleur:document.getElementById('sr-kleur-'+i)?.value||'',gewicht:parseFloat(gew),lengte:document.getElementById('sr-len-'+i)?.value||'',dikte:document.getElementById('sr-dikte-'+i)?.value||'',structuur:document.getElementById('sr-str-'+i)?.value||'',herkomst:document.getElementById('sr-herk-'+i)?.value||'',punt:document.getElementById('sr-punt-'+i)?.value||'',prijs:document.getElementById('sr-prijs-'+i)?.value||'',opm:document.getElementById('sr-opm-'+i)?.value||'',foto:fotoMap[i]||null});
  }
  if(fout||!nieuweStaarten.length){document.getElementById('nb-msg').innerHTML='<span class="warn">Vul nummer en gewicht in voor alle staarten</span>';btn.disabled=false;btn.textContent='💾 Bestelling opslaan';return;}
  const bestelling={id,nummer:nr,datum:document.getElementById('nb-datum')?.value||new Date().toLocaleDateString('nl-NL'),levering:document.getElementById('nb-levering')?.value||'',fabriek:document.getElementById('nb-fab')?.value.trim()||'',opm:document.getElementById('nb-opm')?.value||'',status:'open'};
  try{
    await sb.from('bestellingen').insert(bestelling);
    await sb.from('staarten').insert(nieuweStaarten);
    cache.bestellingen.unshift(bestelling);
    cache.staarten.push(...nieuweStaarten);
    toast('✓ Bestelling opgeslagen!');
    rijTeller=0;fotoMap={};
    openBestelling(id);
  }catch(e){document.getElementById('nb-msg').innerHTML='<span class="warn">Fout bij opslaan: '+e.message+'</span>';btn.disabled=false;btn.textContent='💾 Bestelling opslaan';}
}

function wStatusBadge(s){
  const map={beschikbaar:'ws-beschikbaar',gereserveerd:'ws-gereserveerd',verkocht:'ws-verkocht'};
  return `<span class="badge ${map[s]||'badge-gray'}">${s||'beschikbaar'}</span>`;
}
function kwBadge(k){return k?`<span class="badge kw-${k}">Kwaliteit ${k}</span>`:''}

function renderBestelling(id){
  const b=cache.bestellingen.find(x=>x.id===id);if(!b)return;
  const staarten=cache.staarten.filter(s=>s.bestel_id===id);
  const alleW=cache.weavings.filter(w=>w.bestel_id===id);
  const totS=staarten.reduce((a,s)=>a+(parseFloat(s.gewicht)||0),0);
  const totW=alleW.reduce((a,w)=>a+(parseFloat(w.gewicht)||0),0);
  const verlies=totW>0?(totS-totW).toFixed(1)+'g':'—';
  const verliesPct=totW>0?' ('+((totS-totW)/totS*100).toFixed(1)+'%)':'';
  const sl={'open':'Aangemaakt','fabriek':'Bij fabriek','terug':'Terug ontvangen'};
  const volgende=b.status==='open'?'fabriek':b.status==='fabriek'?'terug':null;
  const volgendeLbl=b.status==='open'?'→ Verstuurd naar fabriek':'→ Terug ontvangen';

  const staartBlokken=staarten.map(s=>{
    const sw=alleW.filter(w=>w.staart_id===s.id);
    const beschikbaar=sw.filter(w=>!w.status||w.status==='beschikbaar').length;
    const verkocht=sw.filter(w=>w.status==='verkocht').length;
    const gereserveerd=sw.filter(w=>w.status==='gereserveerd').length;
    const weavingItems=sw.length?sw.map(w=>`
      <div class="weaving-rij">
        <div class="weaving-meta">
          <div class="row" style="gap:6px;flex-wrap:wrap;margin-bottom:6px">
            <span class="badge badge-teal">${w.code}</span>
            ${wStatusBadge(w.status)}
            ${kwBadge(w.kwaliteit)}
          </div>
          <div style="font-size:12px;color:#666;display:flex;gap:12px;flex-wrap:wrap;margin-bottom:4px">
            ${w.gewicht?`<span>⚖️ ${w.gewicht}g</span>`:''}
            ${w.lengte?`<span>📏 ${w.lengte}cm</span>`:''}
            ${w.weft?`<span>↔️ ${w.weft}cm breedte</span>`:''}
            ${w.prijs?`<span>💶 €${parseFloat(w.prijs).toFixed(2)}</span>`:''}
            ${w.salon?`<span>🏠 ${w.salon}</span>`:''}
            ${w.klant?`<span>👤 ${w.klant}</span>`:''}
          </div>
          ${w.opm?`<div class="opm-bubble">${w.opm}</div>`:''}
        </div>
        <button class="btn btn-sm" onclick="openWeavingEdit('${w.id}','${id}')">✏️</button>
      </div>`).join('')
    :`<div style="padding:12px 16px;font-size:13px;color:#888">Nog geen weavings geregistreerd.</div>`;

    return `<div class="staart-blok">
      <div class="staart-header" onclick="toggleSlaart('${s.id}')">
        <div class="row" style="gap:12px;flex:1;min-width:0">
          ${s.foto
            ?`<div style="display:flex;gap:4px;flex-shrink:0">
                <img src="${s.foto}" class="foto-thumb" onclick="event.stopPropagation();toonFotoModal('${s.id}')" alt="foto 1">
                ${s.foto2?`<img src="${s.foto2}" class="foto-thumb" onclick="event.stopPropagation();toonFotoModal('${s.id}')" alt="foto 2">`
                :`<div style="width:46px;height:46px;border-radius:8px;background:#f5f4f0;border:1px dashed #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:14px" onclick="event.stopPropagation();openFotoUpload('${s.id}','${id}','foto2')" title="Tweede foto toevoegen">+📷</div>`}
              </div>`
            :`<div style="width:46px;height:46px;border-radius:8px;background:#f5f4f0;border:1px dashed #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:20px" onclick="event.stopPropagation();openFotoUpload('${s.id}','${id}','foto')">📷</div>`}
          <div style="flex:1;min-width:0">
            <div class="row" style="gap:6px;flex-wrap:wrap;margin-bottom:4px">
              <span class="badge badge-purple">${s.nr}</span>
              ${s.kleur?`<span style="font-size:12px;color:#666">${s.kleur}</span>`:''}
              ${s.herkomst?`<span style="font-size:12px;color:#666">${s.herkomst}</span>`:''}
              ${sw.length===0?`<span style="background:#FAEEDA;color:#633806;display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500">⏳ Weavings ontbreken</span>`:``}
            </div>
            <div style="font-size:12px;color:#888;display:flex;gap:10px;flex-wrap:wrap">
              <span>${s.gewicht}g</span>
              ${s.lengte?`<span>${s.lengte}cm</span>`:''}
              ${s.dikte?`<span>${s.dikte}</span>`:''}
              ${s.structuur?`<span>${s.structuur}</span>`:''}
              ${s.punt?`<span>Punt: ${s.punt}</span>`:''}
              <span style="color:#1a1a1a;font-weight:500">${sw.length} weaving${sw.length!==1?'s':''}</span>
              ${beschikbaar?`<span style="color:#085041">${beschikbaar} beschikbaar</span>`:''}
              ${gereserveerd?`<span style="color:#633806">${gereserveerd} gereserveerd</span>`:''}
              ${verkocht?`<span style="color:#444">${verkocht} verkocht</span>`:''}
            </div>
          </div>
        </div>
        <div class="row" style="gap:6px;flex-shrink:0" onclick="event.stopPropagation()">
          <button class="btn btn-sm" onclick="toonFotoModal('${s.id}')">📷</button>

          <button class="btn btn-sm" onclick="openSlaartEdit('${s.id}','${id}')">✏️</button>
          <button class="btn btn-sm btn-primary" onclick="openWeavingForm('${id}','${s.id}')">+ Weaving</button>
        </div>
        <span class="chevron" id="chev-${s.id}">▾</span>
      </div>
      ${s.opm?`<div style="padding:6px 16px 10px;background:#fafaf8"><div class="opm-bubble">${s.opm}</div></div>`:''}
      ${(()=>{
        const totWeavingGew=sw.reduce((a,w)=>a+(parseFloat(w.gewicht)||0),0);
        const retour=parseFloat(s.haar_retour)||0;
        const verloren=parseFloat(s.haar_verloren)||0;
        const totaalVerwerkt=totWeavingGew+retour+verloren;
        const verliesGew=(s.gewicht-totaalVerwerkt).toFixed(1);
        const verliesPct=s.gewicht>0?((s.gewicht-totaalVerwerkt)/s.gewicht*100).toFixed(1):0;
        if(totWeavingGew===0) return '';
        return `<div style="padding:8px 16px;background:#fafaf8;border-top:1px solid #f0eeea;display:flex;gap:16px;flex-wrap:wrap">
          <span style="font-size:12px;color:#666">⚖️ Weavings: <strong>${totWeavingGew.toFixed(1)}g</strong></span>
          ${retour?`<span style="font-size:12px;color:#666">↩️ Haar retour: <strong>${retour}g</strong></span>`:''}
          ${verloren?`<span style="font-size:12px;color:#c0392b">⚠️ Haar verloren: <strong>${verloren}g</strong></span>`:''}
          <span style="font-size:12px;color:${parseFloat(verliesGew)>0?'#c0392b':'#085041'}">
            ${parseFloat(verliesGew)>0?`⚠️ Verlies: <strong>${verliesGew}g (${verliesPct}%)</strong>`:`✓ Gewichten kloppen`}

      <div class="row" style="gap:10px"><span style="font-size:20px;font-weight:700">${b.nummer}</span><span class="order-status status-${b.status}">${sl[b.status]||b.status}</span></div>
      <div class="row" style="gap:8px">
        ${volgende?`<button class="btn btn-sm" onclick="updateStatus('${id}','${volgende}')">${volgendeLbl}</button>`:''}

        <button class="btn btn-sm" onclick="verversData('${id}')">🔄 Verversen</button>
        <button class="btn btn-sm" onclick="exporteerBestelling('${id}')">⬇️ CSV</button>
      </div>
    </div>
    <div class="grid3" style="margin-bottom:16px">
      <div class="stat"><div class="stat-val">${staarten.length}</div><div class="stat-lbl">Staarten</div></div>
      <div class="stat"><div class="stat-val">${totS.toFixed(0)}g</div><div class="stat-lbl">Ingezonden</div></div>
      <div class="stat"><div class="stat-val">${totW>0?totW.toFixed(0)+'g':'—'}</div><div class="stat-lbl">Terug als weavings</div></div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;gap:24px;flex-wrap:wrap">
        ${b.fabriek?`<div><span style="font-size:12px;color:#888">Fabriek</span><p>${b.fabriek}</p></div>`:''}
        ${b.datum?`<div><span style="font-size:12px;color:#888">Besteld</span><p>${b.datum}</p></div>`:''}
        ${b.levering?`<div><span style="font-size:12px;color:#888">Verwachte levering</span><p>${b.levering}</p></div>`:''}
      </div>
      ${b.opm?`<p style="font-size:13px;color:#888;margin-top:10px">${b.opm}</p>`:''}
    </div>
    <p class="sec-title">Staarten & weavings</p>
    ${staartBlokken||'<p style="color:#888">Geen staarten</p>'}
    <div style="margin-top:10px"><button class="btn btn-sm" onclick="openSlaartToevoegen('${id}')">+ Staart toevoegen aan bestelling</button></div>
    <div id="weaving-form-container" style="margin-top:16px"></div>`;
}

async function verwijderSlaart(sid,bid){
  if(!confirm('Weet je zeker dat je deze staart wilt verwijderen? Alle gekoppelde weavings worden ook verwijderd.'))return;
  await sb.from('weavings').delete().eq('staart_id',sid);
  await sb.from('staarten').delete().eq('id',sid);
  cache.staarten=cache.staarten.filter(x=>x.id!==sid);
  cache.weavings=cache.weavings.filter(x=>x.staart_id!==sid);
  sluitModal();toast('✓ Staart verwijderd');renderBestelling(bid);
}

// ── VOORRAAD ──
async function renderVoorraad(){
  const filterStatus=document.getElementById('filter-status')?.value||'';
  const filterKw=document.getElementById('filter-kw')?.value||'';
  const filterZoek=(document.getElementById('filter-zoek')?.value||'').toLowerCase().trim();
  const filterLengte=parseFloat(document.getElementById('filter-lengte')?.value)||0;
  const filterStructuur=document.getElementById('filter-structuur')?.value||'';
  
  syncBar('⟳ Voorraad laden...');
  const headers={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'};
  try{
    const [wData,sData,bData]=await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/weavings?select=*&order=created_at.asc`,{headers}).then(r=>r.json()),
      fetch(`${SUPABASE_URL}/rest/v1/staarten?select=*`,{headers}).then(r=>r.json()),
      fetch(`${SUPABASE_URL}/rest/v1/bestellingen?select=*`,{headers}).then(r=>r.json())
    ]);
    if(Array.isArray(wData))cache.weavings=wData;
    if(Array.isArray(sData))cache.staarten=sData;
    if(Array.isArray(bData))cache.bestellingen=bData;
  }catch(e){toast('❌ Fout bij laden voorraad');}
  syncBar(null);

  let weavings=cache.weavings.filter(w=>{
    if(filterStatus&&(w.status||'beschikbaar')!==filterStatus)return false;
    if(filterKw&&w.kwaliteit!==filterKw)return false;
    if(filterLengte&&(parseFloat(w.lengte)||0)<filterLengte)return false;
    if(filterStructuur){
      const s=cache.staarten.find(x=>x.id===w.staart_id);
      if(!s||s.structuur!==filterStructuur)return false;
    }
    if(filterZoek){
      const s=cache.staarten.find(x=>x.id===w.staart_id);
      const kleur=(s?.kleur||'').toLowerCase();
      const herkomst=(s?.herkomst||'').toLowerCase();
      const structuur=(s?.structuur||'').toLowerCase();
      const dikte=(s?.dikte||'').toLowerCase();
      const code=(w.code||'').toLowerCase();
      const klant=(w.klant||'').toLowerCase();
      const salon=(w.salon||'').toLowerCase();
      const opm=(w.opm||'').toLowerCase();
      const velden=[kleur,herkomst,structuur,dikte,code,klant,salon,opm];
      const exactMatch=velden.some(v=>v===filterZoek);
      const startsMatch=velden.some(v=>v.startsWith(filterZoek));
      if(!exactMatch&&!startsMatch)return false;
    }
    return true;
  });
  const totaal=cache.weavings.length;
  const beschikbaar=cache.weavings.filter(w=>!w.status||w.status==='beschikbaar').length;
  const gereserveerd=cache.weavings.filter(w=>w.status==='gereserveerd').length;
  const verkocht=cache.weavings.filter(w=>w.status==='verkocht').length;
  document.getElementById('voorraad-stats').innerHTML=`
    <div class="stat"><div class="stat-val">${totaal}</div><div class="stat-lbl">Totaal weavings</div></div>
    <div class="stat"><div class="stat-val" style="color:#085041">${beschikbaar}</div><div class="stat-lbl">Beschikbaar</div></div>
    <div class="stat"><div class="stat-val" style="color:#633806">${gereserveerd}</div><div class="stat-lbl">Gereserveerd</div></div>
    <div class="stat"><div class="stat-val" style="color:#444">${verkocht}</div><div class="stat-lbl">Verkocht</div></div>`;
  const el=document.getElementById('voorraad-lijst');
  if(!weavings.length){el.innerHTML='<div class="empty-state"><div style="font-size:48px;margin-bottom:12px">🧶</div><p>Geen weavings gevonden.</p></div>';return;}
  let html='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e5e3dc"><thead><tr style="background:#f9f8f5">';
  ['Code','Staart','Kleur','Herkomst','Gewicht','Lengte','Breedte','Kwaliteit','Status','Prijs','Klant','Bestelling'].forEach(h=>html+=`<th style="text-align:left;padding:10px 14px;border-bottom:1px solid #e5e3dc;font-size:12px;color:#666;white-space:nowrap">${h}</th>`);
  html+='</tr></thead><tbody>';
  weavings.forEach(w=>{
    const s=cache.staarten.find(x=>x.id===w.staart_id);
    const b=cache.bestellingen.find(x=>x.id===w.bestel_id);

async function zoekOpNaam(){
  const klant=(document.getElementById('lookup-klant')?.value||'').trim();
  const salon=(document.getElementById('lookup-salon')?.value||'').trim();
  const res=document.getElementById('lookup-result');
  if(!klant&&!salon){res.innerHTML='';return;}
  if((klant&&klant.length<2)||(salon&&salon.length<2)){res.innerHTML='<p style="color:#888;font-size:14px">Typ minimaal 2 letters...</p>';return;}
  res.innerHTML='<p style="color:#888;font-size:14px">Zoeken...</p>';
  const headers={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'};
  try{
    let url=`${SUPABASE_URL}/rest/v1/weavings?select=*&order=created_at.desc`;
    if(klant) url+=`&klant=ilike.*${encodeURIComponent(klant)}*`;
    if(salon) url+=`&salon=ilike.*${encodeURIComponent(salon)}*`;
    const wData=await fetch(url,{headers}).then(r=>r.json());
    if(!Array.isArray(wData)||!wData.length){res.innerHTML='<p style="color:#888;font-size:14px">Geen weavings gevonden.</p>';return;}
    let html='';
    for(const w of wData){
      const sData=await fetch(`${SUPABASE_URL}/rest/v1/staarten?id=eq.${encodeURIComponent(w.staart_id)}&select=*`,{headers}).then(r=>r.json());
      const s=Array.isArray(sData)&&sData.length?sData[0]:null;
      const bData=await fetch(`${SUPABASE_URL}/rest/v1/bestellingen?id=eq.${encodeURIComponent(w.bestel_id)}&select=*`,{headers}).then(r=>r.json());
      const b=Array.isArray(bData)&&bData.length?bData[0]:null;
      html+=`<div class="lookup-result" style="margin-bottom:12px">
        <div class="row" style="margin-bottom:10px;gap:8px;flex-wrap:wrap">
          <span class="badge badge-teal">${w.code}</span>${wStatusBadge(w.status)}${kwBadge(w.kwaliteit)}${b?`<span class="badge badge-blue">${b.nummer}</span>`:''}
        </div>
        ${s&&s.foto?`<img src="${s.foto}" class="foto-thumb-lg" style="cursor:pointer" onclick="toonFotoGrootUrl('${s.foto}')" alt="foto">`:''}
        <div class="detail-row"><span class="detail-key">Gewicht</span><span>${w.gewicht}g</span></div>
        ${w.lengte?`<div class="detail-row"><span class="detail-key">Lengte</span><span>${w.lengte}cm</span></div>`:''}
        ${w.salon?`<div class="detail-row"><span class="detail-key">Salon</span><span>${w.salon}</span></div>`:''}
        ${w.klant?`<div class="detail-row"><span class="detail-key">Klant</span><span>${w.klant}</span></div>`:''}
        ${w.prijs?`<div class="detail-row"><span class="detail-key">Verkoopprijs</span><span>€${parseFloat(w.prijs).toFixed(2)}</span></div>`:''}
        ${s?`<div class="detail-row"><span class="detail-key">Kleur staart</span><span>${s.kleur||'—'}</span></div>
        <div class="detail-row"><span class="detail-key">Herkomst</span><span>${s.herkomst||'—'}</span></div>`:''}
      </div>`;
    }
    res.innerHTML=html;
  }catch(e){res.innerHTML='<p style="color:#c0392b;font-size:14px">Fout bij zoeken: '+e.message+'</p>';}
}

let salonCache=[];

async function renderSalonBestellingen(){
  const el=document.getElementById('bestelling-lijst');
  el.innerHTML='<p style="color:#888;font-size:14px">Laden...</p>';
  const headers={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'};
  try{
    const data=await fetch(`${SUPABASE_URL}/rest/v1/salon_bestellingen?select=*&order=created_at.desc`,{headers}).then(r=>r.json());
    salonCache=Array.isArray(data)?data:[];
  }catch(e){el.innerHTML='<p style="color:#c0392b">Fout bij laden</p>';return;}

  if(!salonCache.length){
    el.innerHTML=`<div class="empty-state"><div style="font-size:48px;margin-bottom:12px">🛒</div><p style="font-weight:500;margin-bottom:6px">Nog geen bestellingen</p><p style="font-size:13px">Voeg je eerste salon bestelling toe.</p></div>`;
    return;
  }

  const openB=salonCache.filter(b=>!b.verzonden);
  const geslotenB=salonCache.filter(b=>b.verzonden);

  let html='';
  if(openB.length){
    html+=`<p style="font-size:13px;font-weight:600;color:#633806;margin-bottom:8px">⏳ Open bestellingen (${openB.length})</p>`;
    openB.forEach(b=>html+=salonBestellingKaart(b));

    html+=`<p style="font-size:13px;font-weight:600;color:#888;margin:16px 0 8px">✅ Verzonden bestellingen (${geslotenB.length})</p>`;
    geslotenB.forEach(b=>html+=salonBestellingKaart(b));
  }
  el.innerHTML=html;
}

function exporteerAlles(){
  let csv='Bestelnummer,Status,Fabriek,Datum,Staart nr,Kleur,Lengte,Gewicht,Herkomst,Dikte,Structuur,Inkoopprijs,Opmerking staart,Aantal weavings\n';
  cache.bestellingen.forEach(b=>{
    cache.staarten.filter(s=>s.bestel_id===b.id).forEach(s=>{
      const sw=cache.weavings.filter(w=>w.staart_id===s.id);
      csv+=`${b.nummer},${b.status},"${b.fabriek||''}",${b.datum},${s.nr},"${s.kleur||''}",${s.lengte||''},${s.gewicht},"${s.herkomst||''}","${s.dikte||''}","${s.structuur||''}",${s.prijs||''},"${(s.opm||'').replace(/"/g,"'")}",${sw.length}\n`;
    });
  });
  downloadCSV(csv,'bestellingen_export.csv');
}
function exporteerBestelling(id){

  if(wv.length){
    csv+='\nCode,Staart,Gewicht,Lengte,Weft,Kwaliteit,Status,Verkoopprijs,Klant,Opmerking,Datum\n';
    wv.forEach(w=>{const s=cache.staarten.find(x=>x.id===w.staart_id);csv+=`${w.code},${s?s.nr:''},${w.gewicht},${w.lengte||''},${w.weft||''},${w.kwaliteit||''},${w.status||'beschikbaar'},${w.prijs||''},"${w.klant||''}","${(w.opm||'').replace(/"/g,"'")}",${w.datum}\n`;});

}

    const s=cache.staarten.find(x=>x.id===w.staart_id);
    const b=cache.bestellingen.find(x=>x.id===w.bestel_id);
    csv+=`${w.code},${b?b.nummer:''},${s?s.nr:''},${w.gewicht},${w.lengte||''},${w.weft||''},${w.kwaliteit||''},${w.status||'beschikbaar'},${w.prijs||''},"${w.klant||''}","${(w.opm||'').replace(/"/g,"'")}","${s?s.kleur||'':''}","${s?s.herkomst||'':''}","${(s?s.opm||'':'').replace(/"/g,"'")}",${w.datum}\n`;
  });
  downloadCSV(csv,'weavings_export.csv');
}
function downloadCSV(csv,naam){const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=naam;a.click();}

// ── START ──
laadAlles().then(()=>renderLijst());
</script>
